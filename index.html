<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEIERABEND SYSTEM 3.0</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#050510;
  color:white;
  font-family:system-ui;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

#timer{
  font-size:4rem;
  font-family:monospace;
  font-weight:900;
}

#title{
  font-size:2rem;
  opacity:.8;
  margin-bottom:1rem;
}
</style>
</head>

<body>

<div>
  <div id="title">Loading timetable...</div>
  <div id="timer">--:--:--</div>
</div>

<script>

const API_URL = "https://backenduntis.onrender.com/api/timetable";

// format minutes → HH:MM
function fmtMin(min){
  const h = String(Math.floor(min/60)).padStart(2,"0");
  const m = String(min%60).padStart(2,"0");
  return `${h}:${m}`;
}

// ms → HH:MM:SS
function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  return String(Math.floor(s/3600)).padStart(2,"0") + ":" +
         String(Math.floor((s%3600)/60)).padStart(2,"0") + ":" +
         String(s%60).padStart(2,"0");
}

async function load(){
  const res = await fetch(API_URL);
  return await res.json();
}

async function tick(){

  const data = await load();

  const now = data.now;
  const next = data.next;

  const endOfDay = 16 * 60;

  const title = document.getElementById("title");
  const timer = document.getElementById("timer");

  // --------------------------
  // NO MORE LESSONS
  // --------------------------
  if(!next){
    const freeMs = (endOfDay - now) * 60 * 1000;

    title.innerText = "NO MORE LESSONS 🎉";
    timer.innerText = fmt(freeMs);
    return;
  }

  const nextStart = next.startMin;

  const timeToNext = (nextStart - now) * 60 * 1000;
  const timeToFreedom = (endOfDay - now) * 60 * 1000;

  title.innerHTML =
    `Next: ${next.subject} (${fmtMin(next.startMin)})<br>` +
    `Room: ${next.room}`;

  timer.innerHTML =
    `⏳ Next lesson: ${fmt(timeToNext)}<br>` +
    `🏁 Freedom: ${fmt(timeToFreedom)}`;

}

setInterval(tick, 1000);
tick();

</script>

</body>
</html>
