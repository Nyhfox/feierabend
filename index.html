<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEIERABEND SYSTEM</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#050510;
  color:white;
  font-family:system-ui;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

#title{
  font-size:1.4rem;
  margin-bottom:10px;
  opacity:0.9;
}

#timer{
  font-size:3rem;
  font-family:monospace;
  font-weight:800;
}
</style>
</head>

<body>

<div>
  <div id="title">Loading timetable...</div>
  <div id="timer">--:--:--</div>
</div>

<script>

const API_URL = "https://backenduntis.onrender.com/api/timetable";

let cache = null;

// ---------------- FETCH ----------------
async function load(){
  try {
    cache = await fetch(API_URL).then(r => r.json());
  } catch(e){
    console.log("API error", e);
  }
}

setInterval(load, 30000);
load();

// ---------------- TIME ----------------
function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes() + d.getSeconds()/60;
}

// ---------------- FORMAT ----------------
function fmt(ms){
  const total = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(total/3600);
  const m = Math.floor((total%3600)/60);
  const s = total%60;

  return String(h).padStart(2,"0") + ":" +
         String(m).padStart(2,"0") + ":" +
         String(s).padStart(2,"0");
}

// ---------------- LESSON LOGIC ----------------
function getCurrent(now, lessons){
  return lessons.find(l => now >= l.startMin && now < l.endMin);
}

// ONLY NON-CANCELLED NEXT LESSON
function getNext(now, lessons){
  return lessons.find(l => l.startMin > now && !l.cancelled);
}

// ALL CANCELLED LESSONS (ALWAYS DISPLAYED)
function getCancelled(lessons){
  return lessons.filter(l => l.cancelled);
}

// ---------------- FEIERABEND ----------------
function getFeierabend(lessons){

  if(!lessons || lessons.length === 0){
    return 16 * 60;
  }

  const sorted = [...lessons].sort((a,b)=>a.endMin-b.endMin);

  let lastValid = null;

  for(const l of sorted){
    if(!l.cancelled){
      lastValid = l;
    }
  }

  if(!lastValid){
    return 16 * 60;
  }

  return lastValid.endMin;
}

// ---------------- MAIN ----------------
function tick(){

  if(!cache || !cache.lessons) return;

  const lessons = cache.lessons;
  const now = nowMinutes();

  const current = getCurrent(now, lessons);
  const next = getNext(now, lessons);
  const cancelled = getCancelled(lessons);

  const feier = getFeierabend(lessons);

  const title = document.getElementById("title");
  const timer = document.getElementById("timer");

  if(!title || !timer) return;

  // ---------------- CANCELLED DISPLAY ----------------
  let cancelledText = "";
  if(cancelled.length > 0){
    cancelledText =
      " ❌ CANCELLED: " +
      cancelled.map(c => `${c.subject}@${c.room}`).join(", ");
  }

  // ---------------- TITLE ----------------
  if(current){
    title.innerText =
      `NOW: ${current.subject} | Room ${current.room}` +
      (current.cancelled ? " ❌ CANCELLED" : "") +
      cancelledText;

  } else if(next){
    title.innerText =
      `NEXT: ${next.subject} | Room ${next.room}` +
      cancelledText;

  } else {
    title.innerText = "NO MORE LESSONS 🎉" + cancelledText;
  }

  // ---------------- TIMER ----------------
  if(next){
    const toNext = (next.startMin - now) * 60000;
    const toFree = (feier - now) * 60000;

    timer.innerHTML =
      `📍 Next room: ${next.room}<br>` +
      `⏳ Next lesson: ${fmt(toNext)}<br>` +
      `🏁 Feierabend: ${fmt(toFree)}`;

  } else {
    const free = (16*60 - now) * 60000;
    timer.innerHTML = `🏁 FREE: ${fmt(free)}`;
  }
}

setInterval(tick, 1000);

</script>

</body>
</html>
