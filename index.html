<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEIERABEND SYSTEM</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#050510;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-family:system-ui;
}

#title{font-size:1.5rem; opacity:.8;}
#timer{font-size:4rem; font-family:monospace; font-weight:900;}
</style>
</head>

<body>

<div>
  <div id="title">Loading...</div>
  <div id="timer">--:--:--</div>
</div>

<script>

const API_URL = "https://YOUR-RENDER-SERVICE.onrender.com/api/timetable";

let cache = null;

// ---------------- FETCH every 30s ONLY ----------------
async function load(){
  try {
    cache = await fetch(API_URL).then(r => r.json());
  } catch(e){
    console.log("API error", e);
  }
}

setInterval(load, 30000);
load();

// ---------------- FORMAT ----------------
function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  return String(Math.floor(s/3600)).padStart(2,"0") + ":" +
         String(Math.floor((s%3600)/60)).padStart(2,"0") + ":" +
         String(s%60).padStart(2,"0");
}

// ---------------- UI UPDATE (every second) ----------------
function tick(){

  if(!cache) return;

  const now = cache.now;
  const next = cache.next;

  const endOfDay = 16 * 60;

  const title = document.getElementById("title");
  const timer = document.getElementById("timer");

  // real current time (fix drift)
  const realNow = new Date();
  const currentMin = realNow.getHours()*60 + realNow.getMinutes();

  if(!next){
    const free = (endOfDay - currentMin) * 60000;

    title.innerText = "NO MORE LESSONS 🎉";
    timer.innerText = fmt(free);
    return;
  }

  const toNext = (next.startMin - currentMin) * 60000;
  const toFree = (endOfDay - currentMin) * 60000;

  title.innerText = `Next: ${next.subject} | Room ${next.room}`;

  timer.innerHTML =
    `⏳ Next: ${fmt(toNext)}<br>` +
    `🏁 Freedom: ${fmt(toFree)}`;
}

setInterval(tick, 1000);
</script>

</body>
</html>
