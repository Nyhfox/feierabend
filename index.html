<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FEIERABEND SYSTEM</title>

<style>
body{
  margin:0;
  height:100vh;
  background:#050510;
  color:white;
  font-family:system-ui;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

#title{
  font-size:1.6rem;
  margin-bottom:10px;
  opacity:0.9;
}

#timer{
  font-size:3rem;
  font-family:monospace;
  font-weight:800;
}
</style>
</head>

<body>

<div>
  <div id="title">Loading timetable...</div>
  <div id="timer">--:--:--</div>
</div>

<script>

const API_URL = "https://backenduntis.onrender.com/api/timetable";

let cache = null;

// ---------------- FETCH DATA ----------------
async function load(){
  try {
    cache = await fetch(API_URL).then(r => r.json());
  } catch(e){
    console.log("API error", e);
  }
}

setInterval(load, 30000);
load();

// ---------------- TIME ----------------
function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}

// ---------------- FORMAT ----------------
function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  return String(Math.floor(s/3600)).padStart(2,"0") + ":" +
         String(Math.floor((s%3600)/60)).padStart(2,"0") + ":" +
         String(s%60).padStart(2,"0");
}

// ---------------- LESSON LOGIC ----------------
function getCurrent(now, lessons){
  return lessons.find(l => now >= l.startMin && now < l.endMin);
}

function getNext(now, lessons){
  return lessons.find(l => l.startMin > now);
}

// ---------------- MAIN LOOP ----------------
function tick(){

  if(!cache || !cache.lessons) return;

  const lessons = cache.lessons;
  const now = nowMinutes();

  const current = getCurrent(now, lessons);
  const next = getNext(now, lessons);

  const endOfDay = 16 * 60;

  const title = document.getElementById("title");
  const timer = document.getElementById("timer");

  // safety guard (prevents crashes)
  if(!title || !timer) return;

  // ---------------- TITLE ----------------
  if(current){
    title.innerText =
      `NOW: ${current.subject} | Room ${current.room}` +
      (current.cancelled ? " ❌ CANCELLED" : "");

  } else if(next){
    title.innerText =
      `NEXT: ${next.subject} | Room ${next.room}` +
      (next.cancelled ? " ❌ CANCELLED" : "");

  } else {
    title.innerText = "NO MORE LESSONS 🎉";
  }

  // ---------------- TIMER ----------------
  if(next){
    const toNext = (next.startMin - now) * 60000;
    const toFree = (endOfDay - now) * 60000;

    timer.innerHTML =
      `⏳ Next lesson: ${fmt(toNext)}<br>` +
      `🏁 Feierabend: ${fmt(toFree)}`;

  } else {
    const free = (endOfDay - now) * 60000;
    timer.innerText = `🏁 FREE: ${fmt(free)}`;
  }
}

setInterval(tick, 1000);

</script>

</body>
</html>
